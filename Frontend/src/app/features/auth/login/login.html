<div class="flex justify-content-center align-items-center h-screen bg-primary-reverse">
  <p-card header="GSDC IoT Monitor" subheader="Ingrese sus credenciales" [style]="{ width: '450px' }">
    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="flex flex-column gap-4">
      
      <div class="flex flex-column gap-2">
        <label for="email" class="font-bold">Correo Electrónico</label>
        <p-iconField iconPosition="left">
          <p-inputIcon styleClass="pi pi-envelope"></p-inputIcon>
          <input pInputText id="email" formControlName="email" placeholder="email@example.com" class="w-full" />
        </p-iconField>
      </div>

      <div class="flex flex-column gap-2">
        <label for="password" class="font-bold">Contraseña</label>
        <p-iconField iconPosition="left">
          <p-inputIcon styleClass="pi pi-lock"></p-inputIcon>
          <input pInputText id="password" type="password" formControlName="password" class="w-full" />
        </p-iconField>
      </div>

      @if (error) {
        <p-message severity="error" [text]="error"></p-message>
      }

      <p-button label="Iniciar Sesión" 
                type="submit" 
                [loading]="loading" 
                [disabled]="loginForm.invalid"
                icon="pi pi-sign-in"
                styleClass="w-full">
      </p-button>

    </form>
    
    <ng-template pTemplate="footer">
      <div class="text-center text-500 text-sm">
        Grupo Salinas DC - Plataforma de Monitoreo
      </div>
    </ng-template>
  </p-card>
</div>
