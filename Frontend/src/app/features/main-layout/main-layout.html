<div class="layout-wrapper">
    
    <!-- Topbar (Flat & Horizontal Navigation) -->
    <header class="layout-header shadow-1">
        <p-menubar [model]="menuItems" styleClass="border-none border-noround bg-surface-card px-4 py-3">
            
            <ng-template pTemplate="start">
                <a routerLink="/" class="flex align-items-center no-underline mr-4">
                    <i class="pi pi-bolt text-primary text-3xl mr-2"></i>
                    <span class="text-xl font-bold text-900">GSDC<span class="text-primary font-light">IoT</span></span>
                </a>
            </ng-template>

            <ng-template pTemplate="end">
                <div class="flex align-items-center gap-2">
                    <button pButton [icon]="themeService.isDark() ? 'pi pi-sun' : 'pi pi-moon'" 
                            class="p-button-rounded p-button-text p-button-secondary"
                            (click)="toggleTheme()"></button>
                    
                    <a routerLink="/alerts" class="relative inline-flex no-underline">
                        <button pButton icon="pi pi-bell" class="p-button-rounded p-button-text p-button-secondary" type="button"></button>
                        @if (store.activeAlerts() > 0) {
                            <p-badge [value]="store.activeAlerts()" severity="danger" styleClass="absolute" style="top: -2px; right: -2px" />
                        }
                    </a>
                    
                    <div class="flex align-items-center cursor-pointer p-2 border-round transition-colors duration-200" 
                         style="background-color: transparent;"
                         #menuContainer
                         (mouseenter)="menuContainer.style.backgroundColor = 'var(--surface-hover)'"
                         (mouseleave)="menuContainer.style.backgroundColor = 'transparent'"
                         (click)="userMenu.toggle($event)">
                        <p-avatar icon="pi pi-user" shape="circle" styleClass="bg-primary-50 text-primary font-bold"></p-avatar>
                        <i class="pi pi-angle-down ml-2 text-400"></i>
                    </div>
                    <p-menu #userMenu [model]="userMenuItems" [popup]="true" appendTo="body"></p-menu>
                </div>
            </ng-template>

        </p-menubar>
    </header>

    <!-- Main Content Area -->
    <main class="layout-main">
        <div class="content-container">
            <router-outlet></router-outlet>
        </div>
    </main>

</div>
