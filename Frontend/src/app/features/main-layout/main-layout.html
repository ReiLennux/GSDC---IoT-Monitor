<div class="layout-wrapper">
        <header class="layout-header shadow-1">
        <p-menubar [model]="menuItems" styleClass="border-none border-noround bg-surface-0 px-4 py-3">
            
            <ng-template pTemplate="start">
                <a routerLink="/" class="flex align-items-center no-underline mr-4">
                    <i class="pi pi-bolt text-primary text-3xl mr-2"></i>
                    <span class="text-xl font-bold text-900">GSDC<span class="text-primary font-light">IoT</span></span>
                </a>
            </ng-template>

            <ng-template pTemplate="end">
                <div class="flex align-items-center gap-2">
                    <button pButton icon="pi pi-bell" class="p-button-rounded p-button-text p-button-secondary"></button>
                    
                    <div class="flex align-items-center cursor-pointer p-2 border-round hover:surface-hover" (click)="userMenu.toggle($event)">
                        <p-avatar icon="pi pi-user" shape="circle" styleClass="bg-primary-50 text-primary font-bold"></p-avatar>
                        <i class="pi pi-angle-down ml-2 text-400"></i>
                    </div>
                    <p-menu #userMenu [model]="userMenuItems" [popup]="true"></p-menu>
                </div>
            </ng-template>

        </p-menubar>
    </header>

    <main class="layout-main">
        <div class="content-container">
            <router-outlet></router-outlet>
        </div>
    </main>

    <footer class="layout-footer py-4 border-top-1 border-200 text-center text-500 bg-surface-0">
        &copy; 2026 GSDC - Platform Monitoring
    </footer>

</div>
